name: 					"Steve Chovanec’s Blog"
description: 		"Learning to use Jekyll"

url: 						"http://localhost:4000"
feed: 					"/feed.xml"

paginate:       10
paginate_path:	"page/:num/"

permalink:			/archive/:categories/:year/:month/:day/:title/

markdown:				redcarpet
highlighter: 		pygments

sass:
    sass_dir: 	_sass
    style:			compressed

exclude: 				["Gemfile", "Gemfile.lock"]