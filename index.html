---
layout: default
---

{% for post in paginator.posts %}
	<article>
		<h1 class="post-title">
			<a href="{{ post.url }}">{{ post.title }}</a>
		</h1>
		<div>
			<p>{{ post.date | date_to_long_string }}</p>
		</div>
		<div class="post-content">
			{{ post.content }}
		</div>
	</article>
{% endfor %}
